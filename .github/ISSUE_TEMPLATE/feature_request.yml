name: Feature request
description: Suggest an improvement to the trend detection workflow
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What support operations problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the workflow or capability you want.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks or privacy considerations
      description: Note any data handling, privacy, or reviewer workflow concerns.
